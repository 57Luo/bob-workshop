spring:
  application:
    name: metro-station-system
  
  # H2 資料庫設定
  datasource:
    url: jdbc:h2:mem:metro;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      connection-init-sql: SET NAMES utf8mb4
  
  # H2 Console 設定
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  
  # JPA 設定
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  
  # SQL 初始化
  sql:
    init:
      mode: always
      encoding: UTF-8

# Server 設定
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-message: always
    include-binding-errors: always

# Logging 設定
logging:
  level:
    com.metro: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

