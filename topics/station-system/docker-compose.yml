version: '3.8'

services:
  station-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metro-station-system
    ports:
      - "8080:8080"
    environment:
      # Spring Boot 配置
      - SPRING_PROFILES_ACTIVE=docker
      # JVM 記憶體設定
      - JAVA_OPTS=-Xmx512m -Xms256m
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/stations"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - station-network

networks:
  station-network:
    driver: bridge

